# Expected output for test_1.docx processed by markdownit parser + regex recognizer
# NOTE: This file requires pandoc to be installed for test execution.
# The markdownit parser chains: DOCX → pandoc markdown → markdown-it AST → IntermediateResult
# NOTE: markdownit parser produces 18 blocks (all text type, no headings detected as separate blocks)
# This is expected behavior - the parser treats all blocks as text.

block_count: 18

block_types:
  - text
  - text
  - text
  - text
  - list_item
  - text
  - text
  - text
  - text
  - text
  - text
  - list_item
  - text
  - list_item
  - text
  - list_item
  - text
  - list_item

blocks:
  "0":
    type: text
    content_contains:
      - "什么是学习"
  "17":
    type: list_item
    content_contains:
      - "Bennett"
